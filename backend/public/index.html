<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Price Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a202c;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #003580;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a202c;
      background: #f7fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
    }

    input:focus {
      outline: none;
      border-color: #003580;
      box-shadow: 0 0 0 3px rgba(0,53,128,0.1);
      background: #fff;
    }

    input::placeholder { color: #a0aec0; }

    button {
      width: 100%;
      padding: 12px;
      background: #003580;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover  { background: #0047b3; }
    button:active { transform: scale(0.99); }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #f0fff4;
      border: 1.5px solid #68d391;
      color: #276749;
      display: block;
    }

    .message.error {
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      color: #c53030;
      display: block;
    }

    .optional {
      font-weight: 400;
      color: #a0aec0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Booking Price Tracker</div>
    <div class="subtitle">Get notified when your hotel drops below your target price.</div>

    <form id="trackForm">
      <label for="url">Booking.com URL</label>
      <input
        type="url"
        id="url"
        name="url"
        placeholder="https://www.booking.com/hotel/..."
        required
      />

      <label for="targetPrice">Target Price (₪)</label>
      <input
        type="number"
        id="targetPrice"
        name="targetPrice"
        placeholder="e.g. 450"
        min="1"
        required
      />

      <label for="email">Email <span class="optional">(optional)</span></label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
      />

      <label for="telegramChatId">Telegram Chat ID <span class="optional">(optional)</span></label>
      <input
        type="text"
        id="telegramChatId"
        name="telegramChatId"
        placeholder="e.g. 123456789"
      />

      <button type="submit" id="submitBtn">Track This Price</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script>
    document.getElementById('trackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      msg.className = 'message';
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const url            = document.getElementById('url').value.trim();
      const targetPrice    = parseFloat(document.getElementById('targetPrice').value);
      const email          = document.getElementById('email').value.trim() || null;
      const telegramChatId = document.getElementById('telegramChatId').value.trim() || null;

      const apiUrl = window.location.origin + '/api/track';
      alert('Sending request to: ' + apiUrl);

      try {
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url,
            targetPrice,
            email,
            telegramChatId,
            telegram: !!telegramChatId,
            roomPackage: 'General',
          }),
        });

        alert('Response received! Status: ' + res.status);

        const data = await res.json();

        if (res.ok) {
          msg.className = 'message success';
          msg.textContent = data.message || 'Tracking started successfully.';
          e.target.reset();
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || 'Something went wrong. Please try again.';
        }
      } catch (err) {
        alert('FETCH ERROR: ' + err.message);
        msg.className = 'message error';
        msg.textContent = 'Could not reach the server. Please try again later.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Track This Price';
      }
    });
  </script>
</body>
</html>
